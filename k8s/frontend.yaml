apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: whatsapp-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: whatsapp-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: whatsapp-dev
spec:
  type: ClusterIP
  ports:
    - port: 80
  selector:
    app: frontend