apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: whatsapp-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: whatsapp-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          ports:
            - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: whatsapp-dev
spec:
  ports:
    - port: 9000
  selector:
    app: api